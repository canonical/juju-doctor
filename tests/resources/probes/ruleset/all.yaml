name: A declarative deployment RuleSet
probes:
  - name: Local ruleset (calling other RuleSets)
    type: ruleset
    uri: file://tests/resources/probes/ruleset/scriptlet.yaml
  - name: Local probe
    type: scriptlet
    uri: file://tests/resources/probes/ruleset/small-dir
  - name: Local probe - failing
    type: scriptlet
    uri: file://tests/resources/probes/python/failing.py